name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push tags

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can find the latest tag

      - name: Compute next version
        id: version
        run: |
          # Subject line of the triggering commit only
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "commit: $COMMIT_MSG"

          # Latest semver tag; default to v0.0.0 if the repo has none yet
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          echo "latest tag: $LATEST_TAG"

          MAJOR=$(echo "${LATEST_TAG#v}" | cut -d. -f1)
          MINOR=$(echo "${LATEST_TAG#v}" | cut -d. -f2)
          PATCH=$(echo "${LATEST_TAG#v}" | cut -d. -f3)

          # ── Bump rules (conventional commits) ────────────────────────────
          # Breaking change:  feat!, fix!, feat(scope)!, etc.  → major
          # New feature:      feat:, feat(scope):              → minor
          # Fix/refactor/chore                                  → patch
          # ci/test/doc/docs                                    → no bump
          if echo "$COMMIT_MSG" | grep -qE '^[a-zA-Z]+(\(.+\))?!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMP=major
          elif echo "$COMMIT_MSG" | grep -qE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0; BUMP=minor
          elif echo "$COMMIT_MSG" | grep -qE '^(fix|refactor|chore)(\(.+\))?:'; then
            PATCH=$((PATCH + 1)); BUMP=patch
          else
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "No version bump for commit type — skipping tag."
            exit 0
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "bump=$BUMP"       >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG"     >> "$GITHUB_OUTPUT"
          echo "new tag: $NEW_TAG ($BUMP)"

      - name: Tag and push
        if: steps.version.outputs.bump != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" \
               -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
