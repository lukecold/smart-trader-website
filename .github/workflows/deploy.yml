name: Release & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/lukecold/smart-trader-website

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version tag
      packages: write   # push to GHCR

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Compute next version ────────────────────────────────────────────
      - name: Compute next version
        id: version
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "commit: $COMMIT_MSG"

          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          echo "latest tag: $LATEST_TAG"

          MAJOR=$(echo "${LATEST_TAG#v}" | cut -d. -f1)
          MINOR=$(echo "${LATEST_TAG#v}" | cut -d. -f2)
          PATCH=$(echo "${LATEST_TAG#v}" | cut -d. -f3)

          if echo "$COMMIT_MSG" | grep -qE '^[a-zA-Z]+(\(.+\))?!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMP=major
          elif echo "$COMMIT_MSG" | grep -qE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0; BUMP=minor
          elif echo "$COMMIT_MSG" | grep -qE '^(fix|refactor|chore)(\(.+\))?:'; then
            PATCH=$((PATCH + 1)); BUMP=patch
          else
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "No version bump — skipping build and deploy."
            exit 0
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "bump=$BUMP"    >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG"  >> "$GITHUB_OUTPUT"
          echo "new tag: $NEW_TAG ($BUMP)"

      # ── 2. Build & push Docker image ──────────────────────────────────────
      - name: Log in to GHCR
        if: steps.version.outputs.bump != 'none'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.version.outputs.bump != 'none'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}

      # ── 3. Deploy to ECS via Cloud Assistant ──────────────────────────────
      # No inbound SSH: GitHub's runner calls the Aliyun API, and the Cloud
      # Assistant agent already on the ECS instance runs the deploy locally.
      # This sidesteps the security-group block on port 22 (CI runner IPs are
      # not allowlisted) and lets us close public SSH entirely. Identity is a
      # scoped RAM AccessKey, not a network ACL.
      #
      # Required repo secrets:
      #   ALIYUN_ACCESS_KEY_ID / ALIYUN_ACCESS_KEY_SECRET  — RAM user with
      #       ecs:RunCommand + ecs:DescribeInvocationResults
      #   ALIYUN_REGION_ID      — e.g. cn-hongkong
      #   ALIYUN_INSTANCE_ID    — the ECS instance id (i-xxxxxxxx)
      - name: Deploy to ECS (Cloud Assistant RunCommand)
        if: steps.version.outputs.bump != 'none'
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          REGION_ID: ${{ secrets.ALIYUN_REGION_ID }}
          INSTANCE_ID: ${{ secrets.ALIYUN_INSTANCE_ID }}
        run: |
          set -euo pipefail

          # Install the Aliyun CLI (no marketplace-action dependency).
          curl -fsSL -o /tmp/aliyun.tgz https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf /tmp/aliyun.tgz -C /tmp
          sudo install /tmp/aliyun /usr/local/bin/aliyun
          aliyun configure set --mode AK --region "$REGION_ID" \
            --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET"

          # The deploy script Cloud Assistant runs *on the instance*.
          SCRIPT='set -e; cd /opt/smart-trader && docker compose pull website && docker compose up -d website && docker image prune -f'
          B64=$(printf '%s' "$SCRIPT" | base64 -w0)

          echo "Invoking Cloud Assistant on $INSTANCE_ID ($REGION_ID)…"
          INVOKE_ID=$(aliyun ecs RunCommand \
            --RegionId "$REGION_ID" \
            --InstanceId.1 "$INSTANCE_ID" \
            --Type RunShellScript \
            --ContentEncoding Base64 \
            --CommandContent "$B64" \
            --Timeout 600 \
            | jq -r '.InvokeId')
          echo "InvokeId=$INVOKE_ID"

          # Poll until the command finishes (RunCommand itself returns immediately).
          for i in $(seq 1 40); do
            sleep 5
            R=$(aliyun ecs DescribeInvocationResults \
              --RegionId "$REGION_ID" --InstanceId "$INSTANCE_ID" --InvokeId "$INVOKE_ID")
            STATUS=$(echo "$R" | jq -r '.Invocation.InvocationResults.InvocationResult[0].InvocationStatus')
            echo "[$i] status=$STATUS"
            OUT=$(echo "$R" | jq -r '.Invocation.InvocationResults.InvocationResult[0].Output')
            case "$STATUS" in
              Success)
                echo "----- instance output -----"; echo "$OUT" | base64 -d 2>/dev/null || echo "$OUT"
                exit 0 ;;
              Failed|Error|Timeout|Cancelled|Terminated|Stopped)
                echo "::error::Cloud Assistant deploy ended with status $STATUS"
                echo "$OUT" | base64 -d 2>/dev/null || echo "$OUT"
                exit 1 ;;
            esac
          done
          echo "::error::Timed out waiting for Cloud Assistant result"; exit 1

      # ── 4. Tag the commit (after successful deploy) ───────────────────────
      - name: Create version tag
        if: steps.version.outputs.bump != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" \
               -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
